project: sentinel-demo
region: us-east-1
env: dev

state:
  backend: local
  path: .infrakit/state.json

services:
  sentinel:
    type: sentinelapi
    mode: full
    upstream_base_url: https://example.com
    jwt:
      secret_key: /sokech/sentinel-jwt-secret-test
      algorithm: HS256
    optimize_for: cost
