name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # e.g. v0.2.0, v1.0.0

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest

  publish:
    name: Build & publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi   # matches the environment name configured on PyPI Trusted Publisher

    permissions:
      id-token: write   # required for OIDC trusted publishing (no API key needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed — uses OIDC trusted publishing configured on pypi.org
